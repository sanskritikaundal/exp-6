<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>React Task Manager</title>

  <!-- React + ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding-top: 40px;
    }

    .app {
      background: #fff;
      width: 350px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-box {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .add-btn {
      background: #2ecc71;
      color: white;
    }

    .task {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      background: #f9f9f9;
    }

    .task.completed span {
      text-decoration: line-through;
      color: gray;
    }

    .actions button {
      margin-left: 5px;
    }

    .complete-btn {
      background: #3498db;
      color: white;
    }

    .delete-btn {
      background: #e74c3c;
      color: white;
    }

    .empty {
      text-align: center;
      color: gray;
      margin-top: 15px;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

  function App() {
    const [tasks, setTasks] = React.useState([]);
    const [input, setInput] = React.useState("");

    // Add Task
    const addTask = () => {
      if (input.trim() === "") return;
      const newTask = {
        id: Date.now(),
        text: input,
        completed: false
      };
      setTasks([...tasks, newTask]);
      setInput("");
    };

    // Toggle Complete
    const toggleTask = (id) => {
      const updated = tasks.map(task =>
        task.id === id ? { ...task, completed: !task.completed } : task
      );
      setTasks(updated);
    };

    // Delete Task
    const deleteTask = (id) => {
      const filtered = tasks.filter(task => task.id !== id);
      setTasks(filtered);
    };

    return (
      <div className="app">
        <h1>📝 Task Manager</h1>

        <div className="input-box">
          <input
            type="text"
            placeholder="Enter a task..."
            value={input}
            onChange={(e) => setInput(e.target.value)}
          />
          <button className="add-btn" onClick={addTask}>Add</button>
        </div>

        {tasks.length === 0 ? (
          <p className="empty">No tasks yet</p>
        ) : (
          tasks.map(task => (
            <div key={task.id} className={`task ${task.completed ? "completed" : ""}`}>
              <span>{task.text}</span>

              <div className="actions">
                <button className="complete-btn" onClick={() => toggleTask(task.id)}>
                  {task.completed ? "Undo" : "Done"}
                </button>
                <button className="delete-btn" onClick={() => deleteTask(task.id)}>
                  Delete
                </button>
              </div>
            </div>
          ))
        )}
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);

</script>
</body>
</html>
