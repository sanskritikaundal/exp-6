<!DOCTYPE html>
<html>
<head>
<title>Profile Card</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#1e1b3a;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Card */

.card{
background:#2b2750;
width:320px;
border-radius:12px;
padding:30px 20px;
text-align:center;
color:white;
position:relative;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* PRO Badge */

.pro{
position:absolute;
top:20px;
left:20px;
background:#f6b41c;
color:black;
padding:5px 10px;
font-weight:bold;
border-radius:4px;
font-size:12px;
}

/* Profile Image */

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #00cfd1;
}

/* Name */

.name{
font-size:22px;
margin-top:15px;
}

/* Location */

.location{
font-size:12px;
color:#ccc;
margin-top:5px;
}

/* Description */

.desc{
margin-top:10px;
font-size:14px;
color:#bdbdbd;
line-height:1.5;
}

/* Buttons */

.buttons{
margin-top:20px;
display:flex;
justify-content:center;
gap:10px;
}

button{
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

.message{
background:#00cfd1;
border:none;
color:white;
}

.follow{
background:transparent;
border:1px solid #00cfd1;
color:#00cfd1;
}

/* Skills */

.skills{
margin-top:30px;
text-align:left;
}

.skills h4{
color:#ccc;
margin-bottom:10px;
}

/* Skill Tags */

.skill{
display:inline-block;
border:1px solid #555;
padding:5px 10px;
margin:4px;
border-radius:4px;
font-size:12px;
}

</style>

</head>

<body>

<div class="card">

<div class="pro">PRO</div>

<div class="profile">
<img src="WhatsApp Image 2026-01-19 at 9.27.52 AM.jpeg">
</div>

<div class="name">Sanskriti</div>

<div class="location">Chandigarh University</div>

<div class="desc">
User interface designer and <br>
front-end developer
</div>

<div class="buttons">
<button class="message">Message</button>
<button class="follow">Following</button>
</div>

<div class="skills">

<h4>SKILLS</h4>

<span class="skill">UI / UX</span>
<span class="skill">Front End Development</span>
<span class="skill">HTML</span>
<span class="skill">CSS</span>
<span class="skill">JavaScript</span>
<span class="skill">React</span>
<span class="skill">Node</span>

</div>

</div>

</body>
</html>
